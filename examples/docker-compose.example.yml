services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data

  graphiti-mcp:
    image: graphiti-mcp:latest
    environment:
      GRAPHITI_GROUP_ID: router
      GRAPHITI_MCP_HOST: 0.0.0.0
      GRAPHITI_MCP_PORT: 8000
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      # OPENAI_API_KEY should come from your local environment or secret manager.
    ports:
      - "8000:8000"
    depends_on:
      - falkordb

volumes:
  falkordb_data:
