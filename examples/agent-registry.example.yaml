agents:
  - name: OrchestratorAgent
    namespace: orchestrator
    domain: routing and coordination
    can_write_namespaces: [orchestrator]
    can_read_namespaces: [orchestrator]

  - name: SecurityAgent
    namespace: security
    domain: defensive security
    can_write_namespaces: [security]
    can_read_namespaces: [security]

  - name: MarketsAgent
    namespace: markets
    domain: market research and risk notes
    can_write_namespaces: [markets]
    can_read_namespaces: [markets]

  - name: DevAgent
    namespace: dev
    domain: software development
    can_write_namespaces: [dev]
    can_read_namespaces: [dev]

  - name: PlannerAgent
    namespace: planner
    domain: planning and follow-up
    can_write_namespaces: [planner]
    can_read_namespaces: [planner]
